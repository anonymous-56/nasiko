services:
  a2a-translator:
    build: .
    container_name: a2a-translator
    environment:
      - LLM_GATEWAY_URL=${LLM_GATEWAY_URL:-http://llm-gateway:4000}
      - LLM_VIRTUAL_KEY=${LLM_VIRTUAL_KEY:-nasiko-dev-virtual-key}
      - LLM_GATEWAY_MODEL=${LLM_GATEWAY_MODEL:-platform-default}
    stdin_open: true
    ports:
      - "5000"
    tty: true
    networks:
      - agents-net

networks:
  agents-net:
    external: true